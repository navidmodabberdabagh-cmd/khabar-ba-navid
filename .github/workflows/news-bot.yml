name: خبر با نوید

on:
  schedule:
    # همه ساعت‌ها به وقت UTC هستند (معادل ساعت ترکیه منهای ۳ ساعت)
    - cron: "0 5 * * *"   # 08:00 استانبول (۳۰ دقیقه)
    - cron: "0 8 * * *"   # 11:00 استانبول (۳۰ دقیقه)
    - cron: "0 10 * * *"  # 13:00 استانبول (۳۰ دقیقه)
    - cron: "0 13 * * *"  # 16:00 استانبول (۳۰ دقیقه)
    - cron: "0 17 * * *"  # 20:00 استانبول (۳۰ دقیقه)
    - cron: "0 19 * * *"  # 22:00 استانبول (۳۰ دقیقه)
    - cron: "0 21 * * *"  # 00:00 استانبول (۳۰ دقیقه)
    - cron: "0 23 * * *"  # 02:00 استانبول (۱۵ دقیقه)
    - cron: "0 0 * * *"   # 03:00 استانبول (۱۵ دقیقه)
  workflow_dispatch: {}   # امکان اجرای دستی برای تست

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: نصب کتابخانه‌ها
        run: pip install -r requirements.txt

      - name: دانلود فونت فارسی (رایگان و متن‌باز)
        run: |
          mkdir -p fonts
          curl -sL -o fonts/Vazirmatn-Regular.ttf "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/ttf/Vazirmatn-Regular.ttf"
          curl -sL -o fonts/Vazirmatn-Bold.ttf "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/ttf/Vazirmatn-Bold.ttf"

      - name: تعیین مدت زمان اجرا بر اساس ساعت
        id: duration
        run: |
          if [ "${{ github.event.schedule }}" == "0 23 * * *" ] || [ "${{ github.event.schedule }}" == "0 0 * * *" ]; then
            echo "seconds=900" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=1700" >> "$GITHUB_OUTPUT"
          fi

      - name: اجرای ربات
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_DURATION_SECONDS: ${{ steps.duration.outputs.seconds }}
        run: python bot.py

      - name: ذخیره لیست خبرهای ارسال‌شده (جلوگیری از تکرار)
        run: |
          git config user.name "khabar-ba-navid-bot"
          git config user.email "actions@github.com"
          git add sent_ids.json || true
          git commit -m "بروزرسانی لیست اخبار ارسال‌شده" || echo "چیزی برای ثبت نبود"
          git push || echo "چیزی برای پوش نبود"
