name: خبر با نوید

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
concurrency:
  group: khabar-ba-navid-bot
  cancel-in-progress: false
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: نصب کتابخانه‌ها
        run: pip install -r requirements.txt

      - name: دانلود فونت فارسی (رایگان و متن‌باز)
        run: |
          mkdir -p fonts
          curl -sL -o fonts/Vazirmatn-Regular.ttf "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/ttf/Vazirmatn-Regular.ttf"
          curl -sL -o fonts/Vazirmatn-Bold.ttf "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/ttf/Vazirmatn-Bold.ttf"

      - name: اجرای ربات
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_DURATION_SECONDS: "120"
        run: python bot.py

      - name: ذخیره لیست خبرهای ارسال‌شده (جلوگیری از تکرار)
        if: always()
        run: |
          git config user.name "khabar-ba-navid-bot"
          git config user.email "actions@github.com"
          git add sent_ids.json || true
          git add chat_ids.json || true
          git add update_offset.json || true
          git commit -m "بروزرسانی لیست اخبار ارسال‌شده" || echo "چیزی برای ثبت نبود"
          git push || echo "چیزی برای پوش نبود"
